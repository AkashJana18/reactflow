<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Responsive App Graph Builder built with ReactFlow, TanStack Query, Zustand, and shadcn/ui." />
    <script>
      (() => {
        const storageKey = "app-graph-builder-theme";
        let theme = "dark";

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          if (storedTheme === "light" || storedTheme === "dark") {
            theme = storedTheme;
          }
        } catch {
          theme = "dark";
        }

        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>App Graph Builder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
